<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="RateInsta - Avalie e descubra os melhores perfis do Instagram. Sistema completo de avaliações com ranking, comentários e estatísticas detalhadas.">
    <meta name="theme-color" content="#000000">
    <title>RateInsta - Avalie Perfis do Instagram | Sistema de Avaliações</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes starPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 3px solid;
            border-image: linear-gradient(90deg, #fff, #666, #fff) 1;
            margin-bottom: 40px;
            position: relative;
        }

        h1 {
            font-size: 4em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.3em;
            opacity: 0.9;
            font-style: italic;
        }

        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            backdrop-filter: blur(10px);
        }

        .search-section {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        #searchInput {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #333;
            background: rgba(0,0,0,0.8);
            color: #fff;
            min-width: 250px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            outline: none;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .rate-btn, .search-btn {
            padding: 15px 35px;
            font-size: 1.1em;
            font-weight: bold;
            border: 2px solid #fff;
            background: rgba(0,0,0,0.8);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .rate-btn:hover, .search-btn:hover {
            background: #fff;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,255,255,0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(20,20,20,0.9), rgba(10,10,10,0.9));
            padding: 35px;
            text-align: center;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        .stat-number {
            font-size: 3.5em;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .profiles-section {
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 2.5em;
            margin-bottom: 30px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: #fff;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .profile-card {
            background: linear-gradient(135deg, #111, #0a0a0a);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideIn 0.5s ease-out;
        }

        .profile-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
        }

        /* Foto de perfil e header */
        .profile-header {
            padding: 30px;
            text-align: center;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.8));
            position: relative;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid #fff;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar.default {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .profile-username {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-handle {
            opacity: 0.8;
            font-size: 1em;
            font-family: monospace;
            margin-bottom: 15px;
        }

        .profile-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 25px;
            text-decoration: none;
            color: #fff;
            font-size: 0.9em;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .profile-link:hover {
            background: #fff;
            color: #000;
            transform: translateY(-2px);
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: rgba(0,0,0,0.5);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            display: block;
        }

        .stat-type {
            opacity: 0.8;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rating-section {
            padding: 25px;
        }

        .stars-display {
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        .recent-ratings {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .rating-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9em;
        }

        .rating-stars {
            font-size: 1.1em;
            min-width: 80px;
        }

        .rating-comment {
            flex: 1;
            color: #ccc;
        }

        .rating-date {
            font-size: 0.75em;
            opacity: 0.5;
            min-width: 80px;
            text-align: right;
        }

        .no-results {
            text-align: center;
            padding: 80px;
            font-size: 1.5em;
            opacity: 0.6;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            grid-column: 1 / -1;
        }

        /* Loading shimmer para fotos */
        .avatar-loading {
            animation: shimmer 2s infinite;
            background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
            background-size: 1000px 100%;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.3s ease;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 40px;
            max-width: 550px;
            width: 90%;
            animation: fadeInUp 0.4s ease;
        }

        .modal-content h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #333;
            background: #000;
            color: #fff;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-input:focus {
            outline: none;
            border-color: #fff;
        }

        .stars-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .star-select {
            font-size: 3em;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #444;
            background: transparent;
            border: none;
        }

        .star-select:hover {
            transform: scale(1.2);
        }

        .star-select.selected {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
            animation: starPop 0.3s ease;
        }

        .modal-comment {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 2px solid #333;
            color: #fff;
            font-size: 1em;
            resize: vertical;
            min-height: 100px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
        }

        .modal-submit {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-cancel {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 3px solid #fff;
            padding: 35px;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            z-index: 2000;
            animation: fadeInUp 0.3s ease;
        }

        .admin-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .admin-btn.danger {
            background: #ff4444;
            color: #fff;
        }

        .admin-close {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            border-left: 4px solid #fff;
            z-index: 3000;
            animation: slideIn 0.3s ease;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            h1 { font-size: 2em; letter-spacing: 3px; }
            .search-section { flex-direction: column; }
            .profile-grid { grid-template-columns: 1fr; }
            .section-title { font-size: 1.8em; }
            .profile-avatar { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⭐ RateInsta</h1>
            <p class="subtitle">Avalie e descubra os melhores perfis do Instagram</p>
            <div class="status-badge">🔴 Sistema Online</div>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Buscar perfil por @username..." onkeyup="searchProfiles()">
            <button class="search-btn" onclick="searchProfiles()">🔍 Buscar</button>
            <button class="rate-btn" onclick="showRateModal()">⭐ Avaliar Perfil</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-number" id="totalProfiles">0</span>
                <span class="stat-label">Perfis Cadastrados</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="totalRatings">0</span>
                <span class="stat-label">Avaliações Totais</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="avgRating">0.0</span>
                <span class="stat-label">Média Geral</span>
            </div>
        </div>

        <div class="profiles-section">
            <h2 class="section-title">🏆 Top 10 Mais Avaliados</h2>
            <div class="profile-grid" id="topProfiles">
                <div class="no-results">✨ Nenhum perfil encontrado. Comece avaliando um perfil!</div>
            </div>
        </div>

        <div class="profiles-section">
            <h2 class="section-title">📉 Com Menos Avaliações</h2>
            <div class="profile-grid" id="bottomProfiles">
                <div class="no-results">📭 Aguardando primeiras avaliações...</div>
            </div>
        </div>
    </div>

    <div id="rateModal" class="modal-overlay">
        <div class="modal-content">
            <h2>⭐ Avaliar Perfil</h2>
            <input type="text" id="modalUsername" class="modal-input" placeholder="@username" autocomplete="off">
            <div class="stars-selector" id="starsSelector">
                <button class="star-select" data-rating="1">☆</button>
                <button class="star-select" data-rating="2">☆</button>
                <button class="star-select" data-rating="3">☆</button>
                <button class="star-select" data-rating="4">☆</button>
                <button class="star-select" data-rating="5">☆</button>
            </div>
            <textarea id="commentInput" class="modal-comment" placeholder="💬 Deixe seu comentário sobre o perfil (opcional)..."></textarea>
            <div class="modal-buttons">
                <button class="modal-submit" onclick="submitRating()">📤 Enviar Avaliação</button>
                <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let profiles = JSON.parse(localStorage.getItem('profiles')) || {};
        let currentRating = 0;

        // Cache de avatares para evitar múltiplas requisições
        const avatarCache = {};

        document.addEventListener('keydown', function(e) {
            if (e.key === '1') {
                const senha = prompt('🔒 Senha do Administrador:');
                if (senha === '171') showAdminPanel();
                else if (senha !== null) showToast('Senha incorreta!', 'error');
            }
        });

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showAdminPanel() {
            const panel = document.createElement('div');
            panel.className = 'admin-panel';
            panel.innerHTML = `
                <h3 style="text-align:center; margin-bottom:20px;">🔧 PAINEL ADMIN</h3>
                <p><strong>📊 Estatísticas:</strong></p>
                <p>📁 Perfis: ${Object.keys(profiles).length}</p>
                <p>⭐ Avaliações: ${Object.values(profiles).reduce((acc, p) => acc + (p.ratings || []).length, 0)}</p>
                <button class="admin-btn danger" onclick="clearAllData()">🗑️ LIMPAR DADOS</button>
                <button class="admin-btn" onclick="exportData()">📥 EXPORTAR DADOS</button>
                <button class="admin-btn" onclick="showSampleData()">🎲 CARREGAR EXEMPLOS</button>
                <button class="admin-close" onclick="this.parentElement.remove()">Fechar</button>
            `;
            document.body.appendChild(panel);
        }

        function clearAllData() {
            if (confirm('⚠️ Tem certeza que deseja limpar TODOS os dados?')) {
                localStorage.clear();
                profiles = {};
                updateDisplay();
                showToast('✅ Todos os dados foram removidos!');
                document.querySelector('.admin-panel')?.remove();
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(profiles, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `rateinsta-backup-${new Date().toISOString().slice(0,19)}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showToast('📥 Backup exportado!');
        }

        function showSampleData() {
            if (confirm('Carregar exemplos?')) {
                profiles = {
                    'therock': {
                        ratings: [
                            { stars: 5, comment: 'Conteúdo incrível!', timestamp: '15/01/2024' },
                            { stars: 5, comment: 'Motivador demais', timestamp: '10/01/2024' }
                        ],
                        recentRatings: [{ stars: 5, comment: 'Conteúdo incrível!', timestamp: '15/01/2024' }],
                        averageRating: 5.0,
                        avatarUrl: 'https://instagram.fcgh20-1.fna.fbcdn.net/v/t51.2885-19/44884218_345707102882519_2446069589734326272_n.jpg?stp=dst-jpg_s150x150&_nc_ht=instagram.fcgh20-1.fna.fbcdn.net&_nc_cat=1&_nc_ohc=abc123'
                    },
                    'cristiano': {
                        ratings: [
                            { stars: 5, comment: 'O melhor!', timestamp: '14/01/2024' },
                            { stars: 5, comment: 'GOAT', timestamp: '12/01/2024' }
                        ],
                        recentRatings: [{ stars: 5, comment: 'O melhor!', timestamp: '14/01/2024' }],
                        averageRating: 5.0
                    },
                    'natgeo': {
                        ratings: [
                            { stars: 5, comment: 'Fotografias sensacionais', timestamp: '13/01/2024' },
                            { stars: 4, comment: 'Conteúdo de qualidade', timestamp: '09/01/2024' }
                        ],
                        recentRatings: [{ stars: 5, comment: 'Fotografias sensacionais', timestamp: '13/01/2024' }],
                        averageRating: 4.5
                    }
                };
                saveProfiles();
                updateDisplay();
                showToast('🎲 Exemplos carregados!');
                document.querySelector('.admin-panel')?.remove();
            }
        }

        // Função para buscar foto de perfil do Instagram
        async function fetchInstagramAvatar(username) {
            if (avatarCache[username]) return avatarCache[username];
            
            // Tentar múltiplas fontes para foto de perfil
            const sources = [
                `https://instagram.com/${username}/?__a=1&__d=1`,
                `https://www.instagram.com/${username}/?__a=1`
            ];
            
            for (const url of sources) {
                try {
                    const response = await fetch(url, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        let avatarUrl = null;
                        
                        // Tentar diferentes estruturas da API do Instagram
                        if (data.graphql?.user?.profile_pic_url) {
                            avatarUrl = data.graphql.user.profile_pic_url;
                        } else if (data.user?.profile_pic_url) {
                            avatarUrl = data.user.profile_pic_url;
                        } else if (data.graphql?.user?.profile_pic_url_hd) {
                            avatarUrl = data.graphql.user.profile_pic_url_hd;
                        }
                        
                        if (avatarUrl) {
                            avatarCache[username] = avatarUrl;
                            return avatarUrl;
                        }
                    }
                } catch (error) {
                    console.log(`Erro ao buscar foto de ${username}:`, error);
                }
            }
            
            // Fallback: usar UI Avatars ou gerar inicial
            const fallbackUrl = `https://ui-avatars.com/api/?name=${username}&background=random&color=fff&size=150&bold=true&length=2`;
            avatarCache[username] = fallbackUrl;
            return fallbackUrl;
        }

        // Gerar avatar com loading e fallback
        function getAvatarHtml(username, avatarUrl = null) {
            if (avatarUrl && avatarUrl !== 'loading') {
                return `<img src="${avatarUrl}" alt="${username}" onerror="this.src='https://ui-avatars.com/api/?name=${username}&background=random&color=fff&size=150&bold=true&length=2'">`;
            }
            return `<div class="default-avatar" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5em;">${username.charAt(0).toUpperCase()}</div>`;
        }

        function saveProfiles() {
            localStorage.setItem('profiles', JSON.stringify(profiles));
        }

        function updateStats() {
            const totalProfiles = Object.keys(profiles).length;
            const totalRatings = Object.values(profiles).reduce((acc, p) => acc + (p.ratings || []).length, 0);
            const avgRating = totalRatings > 0 ? 
                (Object.values(profiles).reduce((acc, p) => acc + ((p.averageRating || 0) * (p.ratings?.length || 0)), 0) / totalRatings).toFixed(1) : 0;

            document.getElementById('totalProfiles').textContent = totalProfiles;
            document.getElementById('totalRatings').textContent = totalRatings;
            document.getElementById('avgRating').textContent = avgRating;
        }

        function getSortedProfiles() {
            return Object.entries(profiles)
                .map(([username, data]) => ({
                    username,
                    ...data,
                    totalRatings: data.ratings?.length || 0,
                    averageRating: data.averageRating || 0
                }))
                .sort((a, b) => b.totalRatings - a.totalRatings);
        }

        async function updateDisplay() {
            const sortedProfiles = getSortedProfiles();
            const topProfiles = sortedProfiles.slice(0, 10);
            const bottomProfiles = sortedProfiles.slice(-10).reverse();

            await updateTopProfiles(topProfiles);
            await updateBottomProfiles(bottomProfiles);
            updateStats();
        }

        async function updateTopProfiles(profilesList) {
            const container = document.getElementById('topProfiles');
            if (profilesList.length === 0) {
                container.innerHTML = '<div class="no-results">✨ Nenhum perfil encontrado. Comece avaliando um perfil!</div>';
                return;
            }

            container.innerHTML = profilesList.map(profile => createProfileCardPlaceholder(profile)).join('');
            
            // Carregar avatares assincronamente
            for (const profile of profilesList) {
                const avatarUrl = await fetchInstagramAvatar(profile.username);
                const avatarImg = container.querySelector(`#avatar-${profile.username.replace(/[^a-z0-9]/gi, '')}`);
                if (avatarImg) {
                    avatarImg.innerHTML = getAvatarHtml(profile.username, avatarUrl);
                }
            }
        }

        async function updateBottomProfiles(profilesList) {
            const container = document.getElementById('bottomProfiles');
            if (profilesList.length === 0) {
                container.innerHTML = '<div class="no-results">📭 Aguardando primeiras avaliações...</div>';
                return;
            }

            container.innerHTML = profilesList.map(profile => createProfileCardPlaceholder(profile)).join('');
            
            for (const profile of profilesList) {
                const avatarUrl = await fetchInstagramAvatar(profile.username);
                const avatarImg = container.querySelector(`#avatar-${profile.username.replace(/[^a-z0-9]/gi, '')}`);
                if (avatarImg) {
                    avatarImg.innerHTML = getAvatarHtml(profile.username, avatarUrl);
                }
            }
        }

        function createProfileCardPlaceholder(profile) {
            const fullStars = Math.round(profile.averageRating || 0);
            const starDisplay = '⭐'.repeat(fullStars) + '☆'.repeat(5 - fullStars);
            const avatarId = `avatar-${profile.username.replace(/[^a-z0-9]/gi, '')}`;
            
            return `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar default" id="${avatarId}">
                            <div class="avatar-loading" style="width:100%;height:100%;"></div>
                        </div>
                        <div class="profile-username">${profile.username}</div>
                        <div class="profile-handle">@${profile.username}</div>
                        <a href="https://instagram.com/${profile.username}" target="_blank" class="profile-link" onclick="event.stopPropagation()">
                            📷 Ver perfil no Instagram
                            <span style="font-size:1.1em;">↗</span>
                        </a>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-value">${profile.averageRating?.toFixed(1) || 0}</span>
                            <span class="stat-type">Nota média</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${profile.totalRatings || 0}</span>
                            <span class="stat-type">Avaliações</span>
                        </div>
                    </div>
                    <div class="rating-section">
                        <div class="stars-display">${starDisplay}</div>
                        <div class="recent-ratings">
                            <strong>📝 Últimas avaliações:</strong>
                            ${profile.recentRatings?.slice(0, 3).map(rating => `
                                <div class="rating-item">
                                    <span class="rating-stars">${'⭐'.repeat(rating.stars)}</span>
                                    <span class="rating-comment">${rating.comment ? (rating.comment.length > 40 ? rating.comment.substring(0, 40) + '...' : rating.comment) : 'Sem comentário'}</span>
                                    <span class="rating-date">${rating.timestamp || 'Data não informada'}</span>
                                </div>
                            `).join('') || '<div class="rating-item">Nenhuma avaliação ainda</div>'}
                        </div>
                    </div>
                </div>
            `;
        }

        function searchProfiles() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm === '') {
                updateDisplay();
            } else {
                const filtered = getSortedProfiles().filter(p => p.username.toLowerCase().includes(searchTerm));
                updateTopProfiles(filtered);
                document.getElementById('bottomProfiles').innerHTML = '';
            }
        }

        function showRateModal() {
            document.getElementById('rateModal').style.display = 'flex';
            document.getElementById('modalUsername').focus();
            currentRating = 0;
            document.getElementById('commentInput').value = '';
            document.querySelectorAll('.star-select').forEach(star => {
                star.innerHTML = '☆';
                star.classList.remove('selected');
            });
        }

        function closeModal() {
            document.getElementById('rateModal').style.display = 'none';
        }

        document.querySelectorAll('.star-select').forEach(star => {
            star.addEventListener('click', () => {
                const rating = parseInt(star.dataset.rating);
                currentRating = rating;
                document.querySelectorAll('.star-select').forEach((s, index) => {
                    if (index < rating) {
                        s.innerHTML = '★';
                        s.classList.add('selected');
                    } else {
                        s.innerHTML = '☆';
                        s.classList.remove('selected');
                    }
                });
            });
        });

        function submitRating() {
            const username = document.getElementById('modalUsername').value.trim().replace('@', '').toLowerCase();
            const comment = document.getElementById('commentInput').value.trim();
            
            if (!username) {
                showToast('❌ Digite o @ do perfil!', 'error');
                return;
            }
            
            if (currentRating === 0) {
                showToast('⭐ Selecione uma nota de 1 a 5 estrelas!', 'error');
                return;
            }
    
            if (!profiles[username]) {
                profiles[username] = {
                    ratings: [],
                    recentRatings: []
                };
            }
    
            const rating = {
                stars: currentRating,
                comment: comment || '',
                timestamp: new Date().toLocaleDateString('pt-BR')
            };
    
            profiles[username].ratings.push(rating);
            profiles[username].recentRatings.unshift(rating);
            if (profiles[username].recentRatings.length > 5) {
                profiles[username].recentRatings.pop();
            }
    
            const totalStars = profiles[username].ratings.reduce((acc, r) => acc + r.stars, 0);
            profiles[username].averageRating = totalStars / profiles[username].ratings.length;
    
            saveProfiles();
            updateDisplay();
            closeModal();
            showToast(`✅ Avaliação enviada! @${username} recebeu ${currentRating} estrelas.`);
        }
    
        updateDisplay();
        
        document.getElementById('rateModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
